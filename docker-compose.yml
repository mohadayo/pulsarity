services:
  alert-manager:
    build:
      context: ./services/alert-manager
    ports:
      - "${ALERT_MANAGER_PORT:-8001}:8001"
    environment:
      - ALERT_MANAGER_PORT=8001
      - COLLECTOR_URL=http://health-collector:8002
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - pulsarity-net

  health-collector:
    build:
      context: ./services/health-collector
    ports:
      - "${COLLECTOR_PORT:-8002}:8002"
    environment:
      - COLLECTOR_PORT=8002
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8002/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - pulsarity-net

  dashboard-api:
    build:
      context: ./services/dashboard-api
    ports:
      - "${DASHBOARD_PORT:-8003}:8003"
    environment:
      - DASHBOARD_PORT=8003
      - ALERT_MANAGER_URL=http://alert-manager:8001
      - COLLECTOR_URL=http://health-collector:8002
      - LOG_LEVEL=${LOG_LEVEL:-info}
    depends_on:
      alert-manager:
        condition: service_healthy
      health-collector:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8003/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - pulsarity-net

networks:
  pulsarity-net:
    driver: bridge
